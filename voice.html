<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ALPHA Voice Input</title>
  <style>
    body {
      font-family: 'Space Grotesk', sans-serif;
      background-color: #040209;
      color: #F1F5F9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }
    .container {
      text-align: center;
      background: rgba(8, 4, 18, 0.75);
      border: 1px solid rgba(0, 255, 224, 0.22);
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
    }
    h1 {
      margin-bottom: 10px;
      color: #00FFE0;
    }
    #status {
      font-size: 18px;
      margin-bottom: 20px;
      color: #94A3B8;
    }
    .mic-button {
      background: linear-gradient(135deg, #00FFE0, #FF007F);
      border: none;
      border-radius: 50%;
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 0 15px rgba(0, 255, 224, 0.35);
      animation: pulse 1.5s infinite alternate;
      margin: 0 auto;
    }
    .mic-button svg {
      width: 40px;
      height: 40px;
      fill: #040209;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 10px rgba(0, 255, 224, 0.2); transform: scale(0.95); }
      100% { box-shadow: 0 0 30px rgba(0, 255, 224, 0.6); transform: scale(1.05); }
    }
    #result {
      margin-top: 20px;
      font-size: 16px;
      min-height: 24px;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Voice Assistant</h1>
    <div id="status">Listening... Please speak now.</div>
    <div class="mic-button">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5-3c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
    </div>
    <div id="result"></div>
  </div>
  <script src="voice.js"></script>
</body>
</html>
